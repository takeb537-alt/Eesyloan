name: Ultimate Final Fix

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean Workspace
        # Isse purane saare galat folders (android, gradle) delete ho jayenge
        run: |
          rm -rf android
          rm -rf build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Fresh Android Setup
        # Yeh ek fresh, error-free android folder generate karega
        run: flutter create . --platforms android

      - name: Get Packages
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EasyLoan-App
          path: build/app/outputs/flutter-apk/app-debug.apk
