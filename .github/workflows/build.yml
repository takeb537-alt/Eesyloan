name: EasyLoan Build APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Master Fix and Build
        run: |
          # Step 1: Forcefully fix the name to lowercase in pubspec.yaml
          sed -i 's/name: .*/name: eesyloan/' pubspec.yaml || echo "name: eesyloan" > pubspec.yaml
          
          # Step 2: Clean and Repair Android files
          flutter clean
          flutter create . --platforms android --overwrite
          
          # Step 3: Get all dependencies
          flutter pub get
          
          # Step 4: Setup local.properties correctly
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          
          # Step 5: High Power Build
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EasyLoan-App
          path: build/app/outputs/flutter-apk/app-release.apk
