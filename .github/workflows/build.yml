name: EasyLoan Build APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Atomic Repair and Build
        run: |
          # 1. Purani pubspec file ko delete karke naya valid lowercase name set karo
          # Ye command direct file content badal degi bina kisi error ke
          printf "name: eesyloan\ndescription: A new Flutter project.\nversion: 1.0.0+1\nenvironment:\n  sdk: '>=3.0.0 <4.0.0'\ndependencies:\n  flutter:\n    sdk: flutter\ndev_dependencies:\n  flutter_test:\n    sdk: flutter\nflutter:\n  uses-material-design: true" > pubspec.yaml

          # 2. Project structure ko naye Flutter ke hisaab se force-rebuild karo
          flutter create . --platforms android --overwrite
          
          # 3. Dependencies fetch karo
          flutter pub get
          
          # 4. Local properties setup
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          
          # 5. Final Hard Build
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EasyLoan-App
          path: build/app/outputs/flutter-apk/app-release.apk
