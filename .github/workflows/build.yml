name: Build EasyLoan Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.0
          channel: stable
          cache: true

      - name: Create directories
        run: |
          mkdir -p lib/models lib/providers lib/screens assets/images

      - name: Write pubspec.yaml
        run: |
          cat > pubspec.yaml << 'PUBEOF'
          name: easyloan
          description: EasyLoan App
          publish_to: 'none'
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.8
            provider: ^6.1.2
            shared_preferences: ^2.2.3
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^4.0.0
          flutter:
            uses-material-design: true
            assets:
              - assets/images/
          PUBEOF

      - name: Write user_model.dart
        run: |
          cat > lib/models/user_model.dart << 'DARTEOF'
          enum LoanStatus { active, overdue, completed, pending }

          class UserModel {
            final String fullName;
            UserModel({required this.fullName});
            Map<String, dynamic> toJson() => {'fullName': fullName};
            factory UserModel.fromJson(Map<String, dynamic> j) =>
                UserModel(fullName: j['fullName'] ?? '');
          }

          class LoanModel {
            final String id;
            final String userId;
            final double amount;
            final double interestRate;
            final int termMonths;
            double penalty;
            double amountPaid;
            LoanStatus status;
            final DateTime appliedDate;
            bool autopayActive;

            LoanModel({
              required this.id,
              required this.userId,
              required this.amount,
              required this.interestRate,
              required this.termMonths,
              this.penalty = 0,
              this.amountPaid = 0,
              this.status = LoanStatus.pending,
              required this.appliedDate,
              this.autopayActive = false,
            });

            double get totalDue =>
                amount + (amount * interestRate / 100) + penalty;
            double get principalDue => amount - amountPaid;

            Map<String, dynamic> toJson() => {
                  'id': id,
                  'userId': userId,
                  'amount': amount,
                  'interestRate': interestRate,
                  'termMonths': termMonths,
                  'penalty': penalty,
                  'amountPaid': amountPaid,
                  'status': status.name,
                  'appliedDate': appliedDate.toIso8601String(),
                  'autopayActive': autopayActive,
                };

            factory LoanModel.fromJson(Map<String, dynamic> j) => LoanModel(
                  id: j['id'] ?? '',
                  userId: j['userId'] ?? '',
                  amount: (j['amount'] ?? 0).toDouble(),
                  interestRate: (j['interestRate'] ?? 0).toDouble(),
                  termMonths: j['termMonths'] ?? 0,
                  penalty: (j['penalty'] ?? 0).toDouble(),
                  amountPaid: (j['amountPaid'] ?? 0).toDouble(),
                  status: LoanStatus.values.firstWhere(
                    (e) => e.name == j['status'],
                    orElse: () => LoanStatus.pending,
                  ),
                  appliedDate:
                      DateTime.tryParse(j['appliedDate'] ?? '') ?? DateTime.now(),
                  autopayActive: j['autopayActive'] ?? false,
                );
          }
          DARTEOF

      - name: Write app_provider.dart
        run: |
          cat > lib/providers/app_provider.dart << 'DARTEOF'
          import 'dart:convert';
          import 'package:flutter/material.dart';
          import 'package:shared_preferences/shared_preferences.dart';
          import '../models/user_model.dart';

          class AppProvider extends ChangeNotifier {
            UserModel? _user;
            List<LoanModel> _loans = [];
            bool _isDark = false;
            bool _loggedIn = false;

            UserModel? get user => _user;
            List<LoanModel> get loans => _loans;
            bool get isDark => _isDark;
            bool get loggedIn => _loggedIn;

            int get onTimePayments => _loans
                .where((l) =>
                    l.status == LoanStatus.completed && l.penalty == 0)
                .length;

            LoanModel? get activeLoan {
              try {
                return _loans.firstWhere((l) =>
                    l.status == LoanStatus.active ||
                    l.status == LoanStatus.overdue);
              } catch (_) {
                return null;
              }
            }

            double get maxUnlockedAmount {
              final c = onTimePayments;
              if (c >= 5) return 50000;
              if (c >= 3) return 25000;
              if (c >= 1) return 15000;
              return 5000;
            }

            Future<void> load() async {
              final p = await SharedPreferences.getInstance();
              _isDark = p.getBool('dark') ?? false;
              _loggedIn = p.getBool('loggedIn') ?? false;
              final us = p.getString('user');
              if (us != null) _user = UserModel.fromJson(jsonDecode(us));
              final ls = p.getString('loans');
              if (ls != null) {
                _loans = (jsonDecode(ls) as List)
                    .map((e) => LoanModel.fromJson(e))
                    .toList();
              }
              notifyListeners();
            }

            Future<void> login(UserModel u) async {
              _user = u;
              _loggedIn = true;
              final p = await SharedPreferences.getInstance();
              await p.setBool('loggedIn', true);
              await p.setString('user', jsonEncode(u.toJson()));
              notifyListeners();
            }

            Future<void> logout() async {
              _user = null;
              _loggedIn = false;
              _loans = [];
              final p = await SharedPreferences.getInstance();
              await p.setBool('loggedIn', false);
              notifyListeners();
            }

            Future<void> addLoan(LoanModel loan) async {
              _loans.add(loan);
              await _save();
              notifyListeners();
            }

            Future<void> updateLoan(LoanModel updated) async {
              final i = _loans.indexWhere((l) => l.id == updated.id);
              if (i != -1) {
                _loans[i] = updated;
                await _save();
                notifyListeners();
              }
            }

            Future<void> _save() async {
              final p = await SharedPreferences.getInstance();
              await p.setString(
                  'loans',
                  jsonEncode(
                      _loans.map((l) => l.toJson()).toList()));
            }

            Future<void> toggleDark() async {
              _isDark = !_isDark;
              final p = await SharedPreferences.getInstance();
              await p.setBool('dark', _isDark);
              notifyListeners();
            }
          }
          DARTEOF

      - name: Write home_screen.dart
        run: |
          cat > lib/screens/home_screen.dart << 'DARTEOF'
          import 'package:flutter/material.dart';
          import 'package:provider/provider.dart';
          import '../providers/app_provider.dart';
          import '../models/user_model.dart';

          class HomeScreen extends StatelessWidget {
            const HomeScreen({super.key});

            @override
            Widget build(BuildContext context) {
              return Consumer<AppProvider>(
                builder: (context, p, _) {
                  final loan = p.activeLoan;
                  final name = p.user?.fullName ?? 'User';
                  final firstName = name.split(' ').first;
                  return Scaffold(
                    backgroundColor: const Color(0xFFF5F5F5),
                    appBar: AppBar(
                      backgroundColor: Colors.green,
                      title: Text('Hi, $firstName',
                          style: const TextStyle(color: Colors.white)),
                      actions: [
                        IconButton(
                          icon: const Icon(Icons.brightness_6,
                              color: Colors.white),
                          onPressed: () => p.toggleDark(),
                        )
                      ],
                    ),
                    body: SingleChildScrollView(
                      padding: const EdgeInsets.all(16),
                      child: Column(
                        children: [
                          Card(
                            shape: RoundedRectangleBorder(
                                borderRadius: BorderRadius.circular(16)),
                            elevation: 4,
                            child: Padding(
                              padding: const EdgeInsets.all(20),
                              child: Column(
                                crossAxisAlignment: CrossAxisAlignment.start,
                                children: [
                                  const Text('Credit Limit',
                                      style: TextStyle(
                                          fontWeight: FontWeight.bold,
                                          fontSize: 16)),
                                  Text(
                                    'Rs. ${p.maxUnlockedAmount.toInt()}',
                                    style: const TextStyle(
                                        fontSize: 28,
                                        color: Colors.green,
                                        fontWeight: FontWeight.bold),
                                  ),
                                  const SizedBox(height: 8),
                                  Text(
                                      '${p.onTimePayments} On-Time Payments',
                                      style: const TextStyle(
                                          color: Colors.grey)),
                                ],
                              ),
                            ),
                          ),
                          const SizedBox(height: 16),
                          if (loan != null)
                            Card(
                              shape: RoundedRectangleBorder(
                                  borderRadius: BorderRadius.circular(16)),
                              elevation: 4,
                              child: Padding(
                                padding: const EdgeInsets.all(20),
                                child: Column(
                                  crossAxisAlignment:
                                      CrossAxisAlignment.start,
                                  children: [
                                    const Text('Active Loan',
                                        style: TextStyle(
                                            fontWeight: FontWeight.bold,
                                            fontSize: 16)),
                                    const SizedBox(height: 8),
                                    Text(
                                        'Amount: Rs. ${loan.amount.toInt()}'),
                                    Text('Status: ${loan.status.name}'),
                                    Text(
                                        'Total Due: Rs. ${loan.totalDue.toInt()}'),
                                    const SizedBox(height: 12),
                                    SizedBox(
                                      width: double.infinity,
                                      child: ElevatedButton(
                                        style: ElevatedButton.styleFrom(
                                            backgroundColor: Colors.green),
                                        onPressed: () {},
                                        child: const Text('Pay Now',
                                            style: TextStyle(
                                                color: Colors.white)),
                                      ),
                                    ),
                                  ],
                                ),
                              ),
                            )
                          else
                            SizedBox(
                              width: double.infinity,
                              child: ElevatedButton(
                                style: ElevatedButton.styleFrom(
                                    backgroundColor: Colors.green,
                                    padding: const EdgeInsets.symmetric(
                                        vertical: 16)),
                                onPressed: () {},
                                child: const Text('Apply for Loan',
                                    style: TextStyle(
                                        color: Colors.white,
                                        fontSize: 16)),
                              ),
                            ),
                        ],
                      ),
                    ),
                  );
                },
              );
            }
          }
          DARTEOF

      - name: Write my_loans_screen.dart
        run: |
          cat > lib/screens/my_loans_screen.dart << 'DARTEOF'
          import 'package:flutter/material.dart';
          import 'package:provider/provider.dart';
          import '../providers/app_provider.dart';
          import '../models/user_model.dart';

          class MyLoansScreen extends StatelessWidget {
            const MyLoansScreen({super.key});

            @override
            Widget build(BuildContext context) {
              return Consumer<AppProvider>(
                builder: (context, p, _) {
                  final loans = p.loans;
                  return Scaffold(
                    appBar: AppBar(
                      backgroundColor: Colors.green,
                      title: const Text('My Loans',
                          style: TextStyle(color: Colors.white)),
                    ),
                    body: loans.isEmpty
                        ? const Center(
                            child: Text('No loans yet',
                                style: TextStyle(fontSize: 18)))
                        : ListView.builder(
                            padding: const EdgeInsets.all(12),
                            itemCount: loans.length,
                            itemBuilder: (ctx, i) {
                              final loan = loans[i];
                              Color statusColor;
                              if (loan.status == LoanStatus.completed) {
                                statusColor = Colors.green;
                              } else if (loan.status ==
                                  LoanStatus.overdue) {
                                statusColor = Colors.red;
                              } else if (loan.status ==
                                  LoanStatus.active) {
                                statusColor = Colors.blue;
                              } else {
                                statusColor = Colors.orange;
                              }
                              return Card(
                                shape: RoundedRectangleBorder(
                                    borderRadius:
                                        BorderRadius.circular(12)),
                                elevation: 3,
                                margin:
                                    const EdgeInsets.only(bottom: 12),
                                child: ListTile(
                                  contentPadding: const EdgeInsets.all(16),
                                  title: Text(
                                    'Rs. ${loan.amount.toInt()}',
                                    style: const TextStyle(
                                        fontWeight: FontWeight.bold,
                                        fontSize: 18),
                                  ),
                                  subtitle: Column(
                                    crossAxisAlignment:
                                        CrossAxisAlignment.start,
                                    children: [
                                      Text(
                                          'Due: Rs. ${loan.totalDue.toInt()}'),
                                      Text(
                                          'Applied: ${loan.appliedDate.day}/${loan.appliedDate.month}/${loan.appliedDate.year}'),
                                    ],
                                  ),
                                  trailing: Container(
                                    padding: const EdgeInsets.symmetric(
                                        horizontal: 10, vertical: 6),
                                    decoration: BoxDecoration(
                                      color: statusColor,
                                      borderRadius:
                                          BorderRadius.circular(20),
                                    ),
                                    child: Text(
                                      loan.status.name.toUpperCase(),
                                      style: const TextStyle(
                                          color: Colors.white,
                                          fontSize: 11,
                                          fontWeight: FontWeight.bold),
                                    ),
                                  ),
                                ),
                              );
                            },
                          ),
                  );
                },
              );
            }
          }
          DARTEOF

