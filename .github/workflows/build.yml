name: Build EasyLoan APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build EasyLoan Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.0
          channel: stable
          cache: true

      - name: Recreate Android folder with correct Gradle format
        run: |
          rm -rf android
          flutter create --platforms android -t app /tmp/easyloan_tmp
          cp -r /tmp/easyloan_tmp/android ./android
          echo "✅ Android folder recreated"
          ls android/

      - name: Copy our pubspec and lib into project
        run: |
          echo "✅ lib/ and pubspec.yaml already in repo root"
          ls lib/
          cat pubspec.yaml

      - name: Get Flutter packages
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release --no-shrink

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EasyLoan-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error
