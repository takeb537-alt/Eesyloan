name: EasyLoan Build APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Final Repair and Build
        run: |
          # 1. Project name thik karo (lowercase)
          sed -i 's/name: .*/name: eesyloan/' pubspec.yaml
          
          # 2. Purana kachra saaf karo
          rm -rf android/local.properties
          
          # 3. Dependencies fetch karo
          flutter pub get
          
          # 4. Android structure fresh karo (taaki Gradle issue na aaye)
          flutter create . --platforms android
          
          # 5. Local properties setup
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          
          # 6. Final Build command
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EasyLoan-App
          path: build/app/outputs/flutter-apk/app-release.apk
