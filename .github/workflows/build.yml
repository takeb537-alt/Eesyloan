name: EasyLoan APK Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.22.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Create asset folders
        run: |
          mkdir -p assets/images
          mkdir -p assets/animations
          mkdir -p assets/fonts
          # Placeholder files so Flutter doesn't error on empty folders
          echo "" > assets/images/.keep
          echo "" > assets/animations/.keep

      - name: Download Poppins fonts
        run: |
          BASE="https://github.com/google/fonts/raw/main/ofl/poppins"
          curl -fsSL "$BASE/Poppins-Regular.ttf"  -o assets/fonts/Poppins-Regular.ttf
          curl -fsSL "$BASE/Poppins-Medium.ttf"   -o assets/fonts/Poppins-Medium.ttf
          curl -fsSL "$BASE/Poppins-SemiBold.ttf" -o assets/fonts/Poppins-SemiBold.ttf
          curl -fsSL "$BASE/Poppins-Bold.ttf"     -o assets/fonts/Poppins-Bold.ttf
          echo "✅ Fonts downloaded:"
          ls -lh assets/fonts/

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter doctor (for debug info)
        run: flutter doctor -v

      - name: Build debug APK
        run: flutter build apk --debug --verbose

      - name: Show APK output
        run: |
          echo "=== APK files ==="
          find build/app/outputs -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EasyLoan-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
          if-no-files-found: error
