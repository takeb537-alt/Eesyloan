name: EasyLoan Build APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Nuclear Fix and Build
        run: |
          # 1. Sab kuch jad se mitao jo build rokti hai
          rm -rf android/
          rm -f pubspec.yaml
          
          # 2. Nayi clean pubspec file create karo
          cat <<EOF > pubspec.yaml
          name: eesyloan
          description: A new Flutter project.
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.6
          dev_dependencies:
            flutter_test:
              sdk: flutter
          flutter:
            uses-material-design: true
          EOF
          
          # 3. Fresh Android structure generate karo
          flutter create . --platforms android --overwrite
          
          # 4. Critical Build Properties (Isse error nahi aayega)
          cd android
          echo "org.gradle.jvmargs=-Xmx1536M" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # 5. Local properties bypass
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> local.properties
          cd ..
          
          # 6. Final Build Command
          flutter pub get
          flutter build apk --release --no-tree-shake-icons --build-number=1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EasyLoan-App-Ready
          path: build/app/outputs/flutter-apk/app-release.apk
