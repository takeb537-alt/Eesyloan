name: Build EasyLoan Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.0
          channel: stable
          cache: true

      - name: Create directories
        run: mkdir -p lib/models lib/providers lib/screens assets/images

      - name: Write pubspec.yaml
        run: |
          cat > pubspec.yaml << 'EOF'
          name: easyloan
          description: EasyLoan App
          publish_to: 'none'
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.8
            provider: ^6.1.2
            shared_preferences: ^2.2.3
            intl: ^0.19.0
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^4.0.0
          flutter:
            uses-material-design: true
            assets:
              - assets/images/
          EOF

      - name: Write user_model.dart
        run: |
          cat > lib/models/user_model.dart << 'EOF'
          enum LoanStatus { active, overdue, completed, pending }

          class UserModel {
            final String fullName;
            UserModel({required this.fullName});
            Map<String, dynamic> toJson() => {'fullName': fullName};
            factory UserModel.fromJson(Map<String, dynamic> j) =>
                UserModel(fullName: j['fullName'] ?? '');
          }

          class LoanModel {
            final String id;
            final String userId;
            final double amount;
            final double interestRate;
            final int termMonths;
            double penalty;
            double amountPaid;
            LoanStatus status;
            final DateTime appliedDate;
            bool autopayActive;

            LoanModel({
              required this.id,
              required this.userId,
              required this.amount,
              required this.interestRate,
              required this.termMonths,
              this.penalty = 0,
              this.amountPaid = 0,
              this.status = LoanStatus.pending,
              required this.appliedDate,
              this.autopayActive = false,
            });

            double get totalDue => amount + (amount * interestRate / 100) + penalty;
            double get principalDue => amount - amountPaid;

            Map<String, dynamic> toJson() => {
              'id': id,
              'userId': userId,
              'amount': amount,
              'interestRate': interestRate,
              'termMonths': termMonths,
              'penalty': penalty,
              'amountPaid': amountPaid,
              'status': status.name,
              'appliedDate': appliedDate.toIso8601String(),
              'autopayActive': autopayActive,
            };

            factory LoanModel.fromJson(Map<String, dynamic> j) => LoanModel(
              id: j['id'] ?? '',
              userId: j['userId'] ?? '',
              amount: (j['amount'] ?? 0).toDouble(),
              interestRate: (j['interestRate'] ?? 0).toDouble(),
              termMonths: j['termMonths'] ?? 0,
              penalty: (j['penalty'] ?? 0).toDouble(),
              amountPaid: (j['amountPaid'] ?? 0).toDouble(),
              status: LoanStatus.values.firstWhere(
                (e) => e.name == j['status'],
                orElse: () => LoanStatus.pending,
              ),
              appliedDate: DateTime.tryParse(j['appliedDate'] ?? '') ?? DateTime.now(),
              autopayActive: j['autopayActive'] ?? false,
            );
          }
          EOF

      - name: Write app_provider.dart
        run: |
          cat > lib/providers/app_provider.dart << 'EOF'
          import 'dart:convert';
          import 'package:flutter/material.dart';
          import 'package:shared_preferences/shared_preferences.dart';
          import '../models/user_model.dart';

          class AppProvider extends ChangeNotifier {
            UserModel? _user;
            List<LoanModel> _loans = [];
            bool _isDark = false;
            bool _loggedIn = false;

            UserModel? get user => _user;
            List<LoanModel> get loans => _loans;
            bool get isDark => _isDark;
            bool get loggedIn => _loggedIn;

            int get onTimePayments =>
                _loans.where((l) => l.status == LoanStatus.completed && l.penalty == 0).length;

            LoanModel? get activeLoan {
              try {
                return _loans.firstWhere(
                  (l) => l.status == LoanStatus.active || l.status == LoanStatus.overdue,
                );
              } catch (_) {
                return null;
              }
            }

            double get maxUnlockedAmount {
              final c = onTimePayments;
              if (c >= 5) return 50000;
              if (c >= 3) return 25000;
              if (c >= 1) return 15000;
              return 5000;
            }

            Future<void> load() async {
              final p = await SharedPreferences.getInstance();
              _isDark = p.getBool('dark') ?? false;
              _loggedIn = p.getBool('loggedIn') ?? false;
              final us = p.getString('user');
              if (us != null) _user = UserModel.fromJson(jsonDecode(us));
              final ls = p.getString('loans');
              if (ls != null) {
                _loans = (jsonDecode(ls) as List).map((e) => LoanModel.fromJson(e)).toList();
              }
              notifyListeners();
            }

            Future<void> login(UserModel u) async {
              _user = u;
              _loggedIn = true;
              final p = await SharedPreferences.getInstance();
              await p.setBool('loggedIn', true);
              await p.setString('user', jsonEncode(u.toJson()));
              notifyListeners();
            }

            Future<void> logout() async {
              _user = null;
              _loggedIn = false;
              _loans = [];
              final p = await SharedPreferences.getInstance();
              await p.setBool('loggedIn', false);
              notifyListeners();
            }

            Future<void> addLoan(LoanModel loan) async {
              _loans.add(loan);
              await _save();
              notifyListeners();
            }

            Future<void> updateLoan(LoanModel updated) async {
              final i = _loans.indexWhere((l) => l.id == updated.id);
              if (i != -1) { _loans[i] = updated; await _save(); notifyListeners(); }
            }

            Future<void> _save() async {
              final p = await SharedPreferences.getInstance();
              await p.setString('loans', jsonEncode(_loans.map((l) => l.toJson()).toList()));
            }

            Future<void> toggleDark() async {
              _isDark = !_isDark;
              final p = await SharedPreferences.getInstance();
              await p.setBool('dark', _isDark);
              notifyListeners();
            }
          }
          EOF

      - name: Write home_screen.dart
        run: |
          cat > lib/screens/home_screen.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:provider/provider.dart';
          import '../providers/app_provider.dart';
          import '../models/user_model.dart';

          class HomeScreen extends StatelessWidget {
            const HomeScreen({super.key});
            @override
            Widget build(BuildContext context) {
              return Consumer<AppProvider>(
                builder: (context, p, _) {
                  final loan = p.activeLoan;
                  final firstName = p.user?.fullName.split(' ').first ?? 'User';
                  return Scaffold(
                    appBar: AppBar(title: Text('Hi, $firstName')),
                    body: Padding(
                      padding: const EdgeInsets.all(16),
                      child: Column(
                        children: [
                          Card(
                            child: Padding(
                              padding: const EdgeInsets.all(16),
                              child: Column(
                                crossAxisAlignment: CrossAxisAlignment.start,
                                children: [
                                  const Text('Credit Limit', style: TextStyle(fontWeight: FontWeight.bold)),
                                  Text('Rs. ${p.maxUnlockedAmount.toInt()}'),
                                  const SizedBox(height: 8),
                                  Text('${p.onTimePayments} On-Time Payments'),
                                ],
                              ),
                            ),
                          ),
                          const SizedBox(height: 16),
                          if (loan != null)
                            Card(
                              child: Padding(
                                padding: const EdgeInsets.all(16),
                                child: Column(
                                  crossAxisAlignment: CrossAxisAlignment.start,
                                  children: [
                                    const Text('Active Loan'),
                                    Text('Amount: Rs. ${loan.amount.toInt()}'),
                                    Text('Status: ${loan.status.name}'),
                                    Text('Total Due: Rs. ${loan.totalDue.toInt()}'),
                                  ],
                                ),
                              ),
                            )
                          else
                            ElevatedButton(
                              onPressed: () {},
                              child: const Text('Apply for Loan'),
                            ),
                        ],
                      ),
                    ),
                  );
                },
              );
            }
          }
          EOF

      - name: Write my_loans_screen.dart
        run: |
          cat > lib/screens/my_loans_screen.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:provider/provider.dart';
          import '../providers/app_provider.dart';
          import '../models/user_model.dart';

          class MyLoansScreen extends StatelessWidget {
            const MyLoansScreen({super.key});
            @override
            Widget build(BuildContext context) {
              return Consumer<AppProvider>(
                builder: (context, p, _) {
                  final loans = p.loans;
                  return Scaffold(
                    appBar: AppBar(title: const Text('My Loans')),
                    body: loans.isEmpty
                        ? const Center(child: Text('No loans yet'))
                        : ListView.builder(
                            itemCount: loans.length,
                            itemBuilder: (ctx, i) {
                              final loan = loans[i];
                              final color = loan.status == LoanStatus.completed
                                  ? Colors.green
                                  : loan.status == LoanStatus.overdue
                                      ? Colors.red
                                      : Colors.blue;
                              return Card(
                                margin: const EdgeInsets.all(8),
                                child: ListTile(
                                  title: Text('Rs. ${loan.amount.toInt()}'),
                                  subtitle: Text('Status: ${loan.status.name}'),
                                  trailing: Container(
                                    padding: const EdgeInsets.symmetric(horizontal: 8, vertical: 4),
                                    decoration: BoxDecoration(color: color, borderRadius: BorderRadius.circular(8)),
                                    child: Text(loan.status.name, style: const TextStyle(color: Colors.white)),
                                  ),
                                ),
                              );
                            },
                          ),
                  );
                },
              );
            }
          }
          EOF

      - name: Write profile_screen.dart
        run: |
          cat > lib/screens/profile_screen.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:provider/provider.dart';
          import '../providers/app_provider.dart';
          import '../models/user_model.dart';

          class ProfileScreen extends StatelessWidget {
            const ProfileScreen({super.key});
            @override
            Widget build(BuildContext context) {
              return Consumer<AppProvider>(
                builder: (context, p, _) {
                  return Scaffold(
                    appBar: AppBar(title: const Text('Profile')),
                    body: Padding(
                      padding: const EdgeInsets.all(16),
                      child: Column(
                        children: [
                          Text(p.user?.fullName ?? 'User',
                              style: const TextStyle(fontSize: 22, fontWeight: FontWeight.bold)),
                          const SizedBox(height: 16),
                          ListTile(title: const Text('On-Time Payments'), trailing: Text('${p.onTimePayments}')),
                          ListTile(title: const Text('Credit Limit'), trailing: Text('Rs. ${p.maxUnlockedAmount.toInt()}')),
                          const SizedBox(height: 24),
                          ElevatedButton(
                            onPressed: () async { await p.logout(); },
                            child: const Text('Logout'),
                          ),
                        ],
                      ),
                    ),
                  );
                },
              );
            }
          }
          EOF

      - name: Write main.dart
        run: |
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:provider/provider.dart';
          import 'providers/app_provider.dart';
          import 'screens/home_screen.dart';
          import 'screens/my_loans_screen.dart';
          import 'screens/profile_screen.dart';

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            final app = AppProvider();
            await app.load();
            runApp(ChangeNotifierProvider.value(value: app, child: const EasyLoanApp()));
          }

          class EasyLoanApp extends StatelessWidget {
            const EasyLoanApp({super.key});
            @override
            Widget build(BuildContext context) {
              return Consumer<AppProvider>(
                builder: (context, p, _) => MaterialApp(
                  title: 'EasyLoan',
                  theme: ThemeData(colorScheme: ColorScheme.fromSeed(seedColor: Colors.green), useMaterial3: true),
                  darkTheme: ThemeData.dark(),
                  themeMode: p.isDark ? ThemeMode.dark : ThemeMode.light,
                  home: const MainNav(),
                ),
              );
            }
          }

          class MainNav extends StatefulWidget {
            const MainNav({super.key});
            @override
            State<MainNav> createState() => _MainNavState();
          }

          class _MainNavState extends State<MainNav> {
            int _i = 0;
            final _screens = const [HomeScreen(), MyLoansScreen(), ProfileScreen()];
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: _screens[_i],
                bottomNavigationBar: NavigationBar(
                  selectedIndex: _i,
                  onDestinationSelected: (i) => setState(() => _i = i),
                  destinations: const [
                    NavigationDestination(icon: Icon(Icons.home), label: 'Home'),
                    NavigationDestination(icon: Icon(Icons.list), label: 'Loans'),
                    NavigationDestination(icon: Icon(Icons.person), label: 'Profile'),
                  ],
                ),
              );
            }
          }
          EOF

      - name: Recreate Android
        run: |
          rm -rf android
          flutter create --platforms=android .
          chmod +x android/gradlew

      - name: Get packages
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-shrink

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EasyLoan-APK
          path: build/app/outputs/flutter-apk/app-release.apk
