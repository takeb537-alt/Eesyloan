name: EasyLoan Build APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Final Build Execution
        run: |
          # 1. Pubspec name sync (Flutter requirements)
          sed -i 's/name: .*/name: easy_loan/' pubspec.yaml
          
          # 2. Re-generate only Android folder (lib folder is safe)
          flutter create . --platforms android --overwrite --project-name easy_loan
          
          # 3. Get all your project dependencies
          flutter pub get
          
          # 4. Final APK Build
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EasyLoan-Final-App
          path: build/app/outputs/flutter-apk/app-release.apk
