name: EasyLoan Build APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Absolute Final Fix
        run: |
          # 1. Purani sabhi problematic files saaf karo
          rm -rf android/
          rm -f pubspec.yaml
          rm -f pubspec.lock

          # 2. Ek dum fresh pubspec file banao jisme name 'easy_loan' ho
          # Note: Flutter ko lowercase + underscore hi pasand hai
          cat <<EOF > pubspec.yaml
          name: easy_loan
          description: A new Flutter project.
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.6
          dev_dependencies:
            flutter_test:
              sdk: flutter
          flutter:
            uses-material-design: true
          EOF

          # 3. Naya project structure generate karo (Isse naming issue khatam ho jayega)
          flutter create . --platforms android --overwrite --project-name easy_loan

          # 4. Android build settings force setup
          cd android
          echo "org.gradle.jvmargs=-Xmx1536M" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> local.properties
          cd ..

          # 5. Build start karo
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EasyLoan-Final-Package
          path: build/app/outputs/flutter-apk/app-release.apk
