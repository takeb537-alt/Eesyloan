name: EasyLoan Build APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Final Repair and Build
        run: |
          # 1. Project name lowercase mein hona chahiye, ye command use pakka kar degi
          sed -i 's/name: .*/name: eesyloan/' pubspec.yaml
          
          # 2. Dependencies fetch karo
          flutter pub get
          
          # 3. Android structure ko fresh karo
          flutter create . --platforms android
          
          # 4. Local properties setup
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          
          # 5. Final Build
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EasyLoan-App
          path: build/app/outputs/flutter-apk/app-release.apk
