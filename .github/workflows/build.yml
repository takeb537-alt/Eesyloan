name: Build EasyLoan Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.22.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.0
          channel: stable
          cache: true

      - name: Create project structure
        run: |
          mkdir -p lib/models lib/providers lib/screens lib/widgets assets/images
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/drawable

      - name: Write pubspec.yaml
        run: |
          cat > pubspec.yaml << 'EOF'
          name: easyloan
          description: EasyLoan App
          publish_to: 'none'
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            flutter_localizations:
              sdk: flutter
            cupertino_icons: ^1.0.8
            provider: ^6.1.2
            shared_preferences: ^2.2.3
            intl: ^0.19.0
            pdf: ^3.10.8
            path_provider: ^2.1.3
            open_file: ^3.3.2
            image_picker: ^1.1.2
            permission_handler: ^11.3.1
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^4.0.0
          flutter:
            uses-material-design: true
            assets:
              - assets/images/
          EOF

      - name: Write all Dart files
        run: |
          python3 << 'PYEOF'
          import os

          files = {}

          # ─── models/user_model.dart ───────────────────────────────────────────
          files['lib/models/user_model.dart'] = '''
          import 'dart:convert';
          import 'dart:io';
          import 'package:flutter/material.dart';
          import 'package:shared_preferences/shared_preferences.dart';
          import 'package:path_provider/path_provider.dart';

          class UserModel {
            final String fullName;
            final List<String> allIds;

            UserModel({required this.fullName, required this.allIds});

            Map<String, dynamic> toJson() => {
              'fullName': fullName,
              'allIds': allIds,
            };

            factory UserModel.fromJson(Map<String, dynamic> json) => UserModel(
              fullName: json['fullName'] ?? '',
              allIds: List<String>.from(json['allIds'] ?? []),
            );
          }

          enum LoanStatus { active, overdue, completed, pending }

          class LoanModel {
            final String id;
            final String userId;
            final double amount;
            final double interestRate;
            final int termMonths;
            double penalty;
            double amountPaid;
            LoanStatus status;
            final DateTime appliedDate;
            String? pdfPath;
            bool autopayActive;

            LoanModel({
              required this.id,
              required this.userId,
              required this.amount,
              required this.interestRate,
              required this.termMonths,
              this.penalty = 0,
              this.amountPaid = 0,
              this.status = LoanStatus.pending,
              required this.appliedDate,
              this.pdfPath,
              this.autopayActive = false,
            });

            double get totalDue => amount + (amount * interestRate / 100) + penalty;
            double get principalDue => amount - amountPaid;

            double calculatePenalty() {
              if (status == LoanStatus.overdue) {
                final days = DateTime.now().difference(appliedDate).inDays;
                if (days <= 0) return 0;
                final base = amount * 0.01;
                if (days <= 5) return base * 0.5;
                if (days <= 10) return base * 1.0;
                if (days <= 15) return base * 1.5;
                if (days <= 20) return base * 2.0;
                if (days <= 25) return base * 2.5;
                if (days <= 30) return base * 3.0;
                return base * 3.0;
              }
              return 0;
            }

            Map<String, dynamic> toJson() => {
              'id': id,
              'userId': userId,
              'amount': amount,
              'interestRate': interestRate,
              'termMonths': termMonths,
              'penalty': penalty,
              'amountPaid': amountPaid,
              'status': status.name,
              'appliedDate': appliedDate.toIso8601String(),
              'pdfPath': pdfPath,
              'autopayActive': autopayActive,
            };

            factory LoanModel.fromJson(Map<String, dynamic> json) => LoanModel(
              id: json['id'] ?? '',
              userId: json['userId'] ?? '',
              amount: (json['amount'] ?? 0).toDouble(),
              interestRate: (json['interestRate'] ?? 0).toDouble(),
              termMonths: json['termMonths'] ?? 0,
              penalty: (json['penalty'] ?? 0).toDouble(),
              amountPaid: (json['amountPaid'] ?? 0).toDouble(),
              status: LoanStatus.values.firstWhere(
                (e) => e.name == json['status'],
                orElse: () => LoanStatus.pending,
              ),
              appliedDate: DateTime.tryParse(json['appliedDate'] ?? '') ?? DateTime.now(),
              pdfPath: json['pdfPath'],
              autopayActive: json['autopayActive'] ?? false,
            );
          }

          class PenaltyCalc {
            static double calculate(double amount) {
              if (amount <= 100) return 10;
              if (amount <= 500) return 30;
              if (amount <= 1000) return 60;
              if (amount <= 1500) return 100;
              return 300;
            }
          }
          '''.strip()

          # ─── providers/app_provider.dart ─────────────────────────────────────
          files['lib/providers/app_provider.dart'] = '''
          import 'dart:convert';
          import 'package:flutter/material.dart';
          import 'package:shared_preferences/shared_preferences.dart';
          import '../models/user_model.dart';

          class AppProvider extends ChangeNotifier {
            static const _kUser = 'user';
            static const _kOnboarded = 'onboarded';
            static const _kOnTime = 'ontime';
            static const _kDark = 'dark';
            static const _kLang = 'lang';
            static const _kLoggedIn = 'loggedIn';
            static const _kPermsDone = 'permsDone';

            UserModel? _user;
            List<LoanModel> _loans = [];
            bool _onboarded = false;
            int _onTimePayments = 0;
            bool _isDark = false;
            String _language = 'en';
            bool _loggedIn = false;
            bool _permsDone = false;
            String _profilePhoto = '';

            UserModel? get user => _user;
            List<LoanModel> get loans => _loans;
            bool get onboarded => _onboarded;
            int get onTimePayments => _onTimePayments;
            bool get isDark => _isDark;
            String get language => _language;
            bool get loggedIn => _loggedIn;
            bool get permsDone => _permsDone;
            String get profilePhoto => _profilePhoto;

            LoanModel? get activeLoan {
              try {
                return _loans.firstWhere(
                  (l) => l.status == LoanStatus.active || l.status == LoanStatus.overdue,
                );
              } catch (_) {
                return null;
              }
            }

            double get maxUnlockedAmount {
              if (_loans.isEmpty) return 5000;
              final completed = _loans.where(
                (l) => l.status == LoanStatus.completed && l.penalty == 0,
              ).length;
              if (completed >= 5) return 50000;
              if (completed >= 3) return 25000;
              if (completed >= 1) return 15000;
              return 5000;
            }

            Future<void> load() async {
              final p = await SharedPreferences.getInstance();
              _onboarded = p.getBool(_kOnboarded) ?? false;
              _onTimePayments = p.getInt(_kOnTime) ?? 0;
              _isDark = p.getBool(_kDark) ?? false;
              _language = p.getString(_kLang) ?? 'en';
              _loggedIn = p.getBool(_kLoggedIn) ?? false;
              _permsDone = p.getBool(_kPermsDone) ?? false;
              _profilePhoto = p.getString('profilePhoto') ?? '';
              final userStr = p.getString(_kUser);
              if (userStr != null) {
                _user = UserModel.fromJson(jsonDecode(userStr));
              }
              final loansStr = p.getString('loans');
              if (loansStr != null) {
                final List list = jsonDecode(loansStr);
                _loans = list.map((e) => LoanModel.fromJson(e)).toList();
              }
              notifyListeners();
            }

            Future<void> saveUser(UserModel u) async {
              _user = u;
              final p = await SharedPreferences.getInstance();
              await p.setString(_kUser, jsonEncode(u.toJson()));
              notifyListeners();
            }

            Future<void> addLoan(LoanModel loan) async {
              _loans.add(loan);
              await _saveLoans();
              notifyListeners();
            }

            Future<void> updateLoan(LoanModel updated) async {
              final i = _loans.indexWhere((l) => l.id == updated.id);
              if (i != -1) {
                _loans[i] = updated;
                await _saveLoans();
                notifyListeners();
              }
            }

            Future<void> _saveLoans() async {
              final p = await SharedPreferences.getInstance();
              await p.setString('loans', jsonEncode(_loans.map((l) => l.toJson()).toList()));
            }

            Future<void> setOnboarded() async {
              _onboarded = true;
              final p = await SharedPreferences.getInstance();
              await p.setBool(_kOnboarded, true);
              notifyListeners();
            }

            Future<void> login(UserModel u) async {
              _user = u;
              _loggedIn = true;
              final p = await SharedPreferences.getInstance();
              await p.setBool(_kLoggedIn, true);
              await p.setString(_kUser, jsonEncode(u.toJson()));
              notifyListeners();
            }

            Future<void> logout() async {
              _user = null;
              _loggedIn = false;
              _loans = [];
              final p = await SharedPreferences.getInstance();
              await p.setBool(_kLoggedIn, false);
              notifyListeners();
            }

            Future<void> toggleDark() async {
              _isDark = !_isDark;
              final p = await SharedPreferences.getInstance();
              await p.setBool(_kDark, _isDark);
              notifyListeners();
            }

            Future<void> setLanguage(String lang) async {
              _language = lang;
              final p = await SharedPreferences.getInstance();
              await p.setString(_kLang, lang);
              notifyListeners();
            }

            Future<void> setProfilePhoto(String path) async {
              _profilePhoto = path;
              final p = await SharedPreferences.getInstance();
              await p.setString('profilePhoto', path);
              notifyListeners();
            }

            Future<void> setPermsDone() async {
              _permsDone = true;
              final p = await SharedPreferences.getInstance();
              await p.setBool(_kPermsDone, true);
              notifyListeners();
            }
          }
          '''.strip()

          # ─── screens/home_screen.dart ─────────────────────────────────────────
          files['lib/screens/home_screen.dart'] = '''
          import 'package:flutter/material.dart';
          import 'package:provider/provider.dart';
          import '../providers/app_provider.dart';
          import '../models/user_model.dart';

          class HomeScreen extends StatelessWidget {
            const HomeScreen({super.key});

            @override
            Widget build(BuildContext context) {
              return Consumer<AppProvider>(
                builder: (context, p, _) {
                  final loan = p.activeLoan;
                  final user = p.user;
                  return Scaffold(
                    appBar: AppBar(
                      title: Text('Hi, \${user?.fullName.split(" ").first ?? "User"}'),
                    ),
                    body: SingleChildScrollView(
                      padding: const EdgeInsets.all(16),
                      child: Column(
                        crossAxisAlignment: CrossAxisAlignment.start,
                        children: [
                          Card(
                            child: Padding(
                              padding: const EdgeInsets.all(16),
                              child: Column(
                                crossAxisAlignment: CrossAxisAlignment.start,
                                children: [
                                  const Text('Credit Limit', style: TextStyle(fontWeight: FontWeight.bold)),
                                  Text('₹\${p.maxUnlockedAmount.toInt()}'),
                                  const SizedBox(height: 8),
                                  const Text('On-Time Payments', style: TextStyle(fontWeight: FontWeight.bold)),
                                  Text('\${p.onTimePayments} On-Time Payments'),
                                ],
                              ),
                            ),
                          ),
                          const SizedBox(height: 16),
                          if (loan != null)
                            Card(
                              child: Padding(
                                padding: const EdgeInsets.all(16),
                                child: Column(
                                  crossAxisAlignment: CrossAxisAlignment.start,
                                  children: [
                                    const Text('Active Loan', style: TextStyle(fontWeight: FontWeight.bold)),
                                    Text('Amount: ₹\${loan.amount.toInt()}'),
                                    Text('Status: \${loan.status.name}'),
                                    Text('Total Due: ₹\${loan.totalDue.toInt()}'),
                                    if (loan.status != LoanStatus.completed)
                                      ElevatedButton(
                                        onPressed: () {},
                                        child: const Text('Pay Now'),
                                      ),
                                    Text('\${p.onTimePayments} On-Time Payments'),
                                  ],
                                ),
                              ),
                            )
                          else
                            ElevatedButton(
                              onPressed: () {},
                              child: const Text('Apply for Loan'),
                            ),
                        ],
                      ),
                    ),
                  );
                },
              );
            }
          }
          '''.strip()

          # ─── screens/my_loans_screen.dart ─────────────────────────────────────
          files['lib/screens/my_loans_screen.dart'] = '''
          import 'package:flutter/material.dart';
          import 'package:provider/provider.dart';
          import '../providers/app_provider.dart';
          import '../models/user_model.dart';

          class MyLoansScreen extends StatelessWidget {
            const MyLoansScreen({super.key});

            @override
            Widget build(BuildContext context) {
              return Consumer<AppProvider>(
                builder: (context, p, _) {
                  final loans = p.loans;
                  return Scaffold(
                    appBar: AppBar(title: const Text('My Loans')),
                    body: loans.isEmpty
                        ? const Center(child: Text('No loans yet'))
                        : ListView.builder(
                            itemCount: loans.length,
                            itemBuilder: (ctx, i) => _LoanCard(loan: loans[i]),
                          ),
                  );
                },
              );
            }
          }

          class _LoanCard extends StatelessWidget {
            final LoanModel loan;
            const _LoanCard({required this.loan});

            Color get _color => loan.status == LoanStatus.completed
                ? Colors.green
                : loan.status == LoanStatus.overdue
                    ? const Color(0xFF2E7D32)
                    : Colors.blue;

            @override
            Widget build(BuildContext context) {
              return Card(
                margin: const EdgeInsets.all(8),
                child: ListTile(
                  title: Text('₹\${loan.amount.toInt()}'),
                  subtitle: Text('Status: \${loan.status.name}'),
                  trailing: Container(
                    padding: const EdgeInsets.symmetric(horizontal: 8, vertical: 4),
                    decoration: BoxDecoration(
                      color: _color,
                      borderRadius: BorderRadius.circular(8),
                    ),
                    child: Text(
                      loan.status.name,
                      style: const TextStyle(color: Colors.white),
                    ),
                  ),
                  onTap: loan.status != LoanStatus.completed
                      ? () => Navigator.push(
                            context,
                            MaterialPageRoute(
                              builder: (_) => _LoanDetailScreen(loan: loan),
                            ),
                          )
                      : null,
                ),
              );
            }
          }

          class _LoanDetailScreen extends StatelessWidget {
            final LoanModel loan;
            const _LoanDetailScreen({required this.loan});

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: const Text('Loan Detail')),
                body: Padding(
                  padding: const EdgeInsets.all(16),
                  child: Column(
                    crossAxisAlignment: CrossAxisAlignment.start,
                    children: [
                      Text('Amount: ₹\${loan.amount.toInt()}'),
                      Text('Status: \${loan.status.name}'),
                      Text('Total Due: ₹\${loan.totalDue.toInt()}'),
                      if (loan.status != LoanStatus.completed) ...[
                        const SizedBox(height: 16),
                        ElevatedButton(
                          onPressed: () {},
                          child: const Text('Make Payment'),
                        ),
                      ],
                      if (loan.status != LoanStatus.completed) ...[
                        if (loan.status != LoanStatus.completed)
                          Text('Due: ₹\${loan.principalDue.toInt()}'),
                      ],
                    ],
                  ),
                ),
              );
            }
          }
          '''.strip()

          # ─── screens/profile_screen.dart ──────────────────────────────────────
          files['lib/screens/profile_screen.dar
